# =============================================================================
# Nginx — admin.elmokef.ma (Admin Panel)
# =============================================================================

upstream elmokef_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# =============================================================================
# HTTPS Server
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.elmokef.ma;

    root /var/www/admin.elmokef.ma;
    index index.html;

    # SSL — Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/admin.elmokef.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.elmokef.ma/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.elmokef.ma/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # =============================================================================
    # SPA — all routes serve index.html (React Router)
    # =============================================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets with fingerprint in name
        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # =============================================================================
    # Reverse Proxy /api/ → Backend
    # =============================================================================
    location /api/ {
        proxy_pass http://elmokef_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        limit_req zone=admin_api burst=20 nodelay;
        limit_req_status 429;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# =============================================================================
# HTTP → HTTPS Redirect
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name admin.elmokef.ma;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Rate Limit Zones
# =============================================================================
limit_req_zone $binary_remote_addr zone=admin_api:10m rate=60r/m;
