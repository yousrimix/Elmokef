# =============================================================================
# Nginx Reverse Proxy — api.elmokef.ma
# =============================================================================

upstream elmokef_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# =============================================================================
# HTTPS Server (Main)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.elmokef.ma;

    # SSL — Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/api.elmokef.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.elmokef.ma/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.elmokef.ma/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (CMI requires HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # =============================================================================
    # CMI Webhook — IP restricted (CMI IPs only)
    # 🔒 P0 fix — فيصل المطيري (Security)
    # =============================================================================
    location /api/v1/payments/webhook {
        # CMI Morocco IP ranges (verified with CMI support)
        allow 83.123.0.0/16;
        allow 196.128.0.0/12;
        allow 105.128.0.0/12;
        deny all;

        proxy_pass http://elmokef_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # CMI expects 200 OK quickly — no buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api/v1/payments/success {
        return 302 https://app.elmokef.ma/payments/success?paymentId=$arg_paymentId;
    }

    location /api/v1/payments/failure {
        return 302 https://app.elmokef.ma/payments/failure?reason=$arg_reason;
    }

    # =============================================================================
    # WebSocket for Payment Confirmation
    # =============================================================================
    location /ws/payments {
        proxy_pass http://elmokef_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =============================================================================
    # API Backend
    # =============================================================================
    location /api/ {
        proxy_pass http://elmokef_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Rate limiting — 100 req/min per IP
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
    }

    # Swagger Docs
    location /api/docs {
        proxy_pass http://elmokef_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploads
    location /uploads/ {
        alias /var/www/elmokef/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health Check
    location /health {
        proxy_pass http://elmokef_backend;
        proxy_set_header Host $host;
        access_log off;
        return 200 "OK";
    }

    # Deny all other paths
    location / {
        return 404;
    }
}

# =============================================================================
# HTTP → HTTPS Redirect
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.elmokef.ma;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Rate Limit Zones
# =============================================================================
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
